<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ name }} — CV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap');

@page {
  size: A4;
  margin: 20mm 24mm 16mm 24mm;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --accent: #4164FF;
  --black: #1A1A1A;
  --gray: #777777;
}

body {
  font-family: "DM Sans", "Helvetica Neue", Arial, sans-serif;
  font-size: 9pt;
  line-height: 1.52;
  color: var(--black);
  background-color: #FFFFFF;
}

/* ===== HEADER ===== */
.cv-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16pt;
}

.cv-name {
  font-family: "DM Sans", "Helvetica Neue", Arial, sans-serif;
  font-size: 20pt;
  font-weight: 900;
  color: var(--black);
  letter-spacing: -0.01em;
  line-height: 1.0;
  text-transform: uppercase;
}

.cv-contact {
  font-size: 8pt;
  color: var(--gray);
  text-align: right;
  line-height: 1.5;
}

.cv-contact a {
  color: var(--gray);
  text-decoration: none;
}

/* ===== SECTIONS ===== */
h2 {
  font-family: "DM Sans", sans-serif;
  font-size: 8pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-top: 14pt;
  margin-bottom: 6pt;
}

h2:first-child {
  margin-top: 0;
}

/* ===== JOB / ENTRY BLOCKS ===== */
h3 {
  font-size: 9pt;
  font-weight: 700;
  color: var(--black);
  margin-top: 8pt;
  margin-bottom: 0;
  line-height: 1.3;
}

h3:first-of-type {
  margin-top: 0;
}

.entry-meta {
  font-size: 8pt;
  font-style: normal;
  color: var(--gray);
  display: block;
  margin-top: 0;
}

.entry-subtitle {
  font-size: 8pt;
  color: var(--gray);
}

p {
  margin-bottom: 4pt;
  line-height: 1.5;
}

ul {
  padding-left: 12pt;
  margin-top: 3pt;
  margin-bottom: 12pt;
}

li {
  margin-bottom: 3pt;
  line-height: 1.48;
  font-size: 9pt;
}

li::marker {
  color: var(--black);
}

a {
  color: var(--black);
  text-decoration: none;
}


/* ===== PRINT ===== */
h2, h3 {
  break-after: avoid;
}

li {
  break-inside: avoid;
}
</style>
</head>
<body>

<header class="cv-header">
  <div class="cv-name">{{ first_name }}<br>{{ last_name }}</div>
  <div class="cv-contact">
    <a href="https://{{ website }}">{{ website }}</a><br>
    <a href="mailto:{{ email }}">{{ email }}</a><br>
    <a href="https://maps.app.goo.gl/vU2j4uw1qQUXr7Lk7">{{ location }}</a>
  </div>
</header>

{{ content }}

</body>
</html>
