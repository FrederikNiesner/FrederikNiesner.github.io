<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ name }} — CV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap');

@page {
  size: A4;
  margin: 20mm 24mm 16mm 24mm;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --accent: #4164FF;
  --black: #1A1A1A;
  --gray: #777777;
}

body {
  font-family: "DM Sans", "Helvetica Neue", Arial, sans-serif;
  font-size: 9pt;
  line-height: 1.52;
  color: var(--black);
  background-color: #FFFFFF;
}

/* ===== HEADER ===== */
.cv-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16pt;
}

.cv-name {
  font-family: "DM Sans", "Helvetica Neue", Arial, sans-serif;
  font-size: 20pt;
  font-weight: 900;
  color: var(--black);
  letter-spacing: -0.01em;
  line-height: 1.0;
  text-transform: uppercase;
}

.cv-contact {
  font-size: 8pt;
  color: var(--gray);
  text-align: right;
  line-height: 1.5;
}

.cv-contact a {
  color: var(--gray);
  text-decoration: none;
}

.cv-contact-row {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  flex-wrap: wrap;
  font-size: 8pt;
  line-height: 1.5;
}

.cv-contact .cv-linkedin {
  display: inline-flex;
  align-items: center;
  line-height: 0;
  flex-shrink: 0;
}

.cv-contact .cv-linkedin img {
  height: 1em;
  width: auto;
  display: block;
}

.cv-hint {
  font-size: 8pt;
  color: var(--gray);
  line-height: 1.5;
  margin: 0 0 12pt 0;
  font-weight: 400;
}

.cv-hint em {
  font-style: italic;
}

.cv-hint .cv-hint-site {
  color: var(--gray);
  font-style: italic;
  text-decoration: none;
  border-bottom: 1px solid #cccccc;
}

.cv-gemini-link {
  display: inline-block;
  vertical-align: middle;
  margin-left: 0;
  line-height: 1;
  text-decoration: none;
  border: 0;
  position: relative;
  top: -0.05em;
}

.cv-gemini-link svg {
  display: block;
  height: 1em;
  width: 1em;
}

/* Keep full stop + Gemini mark on one line in PDF engines that break oddly */
.cv-hint-join {
  white-space: nowrap;
}

/* ===== SECTIONS ===== */
h2 {
  font-family: "DM Sans", sans-serif;
  font-size: 8pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-top: 14pt;
  margin-bottom: 6pt;
}

h2:first-child {
  margin-top: 0;
}

/* ===== JOB / ENTRY BLOCKS ===== */
h3 {
  font-size: 9pt;
  font-weight: 700;
  color: var(--black);
  margin-top: 8pt;
  margin-bottom: 0;
  line-height: 1.3;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1em;
}

h3 em {
  font-style: normal;
  font-weight: 400;
  font-size: 8pt;
  color: var(--gray);
  margin-left: auto;
  white-space: nowrap;
}

h3:first-of-type {
  margin-top: 0;
}

.entry-meta {
  font-size: 8pt;
  font-style: normal;
  color: var(--gray);
  display: block;
  margin-top: 0;
}

.entry-subtitle {
  font-size: 8pt;
  color: var(--gray);
}

p {
  margin-bottom: 4pt;
  line-height: 1.5;
}

ul {
  padding-left: 12pt;
  margin-top: 3pt;
  margin-bottom: 12pt;
}

li {
  margin-bottom: 3pt;
  line-height: 1.48;
  font-size: 9pt;
}

li::marker {
  color: var(--black);
}

a {
  color: var(--black);
  text-decoration: none;
}


/* ===== PRINT ===== */
h2, h3 {
  break-after: avoid;
}

li {
  break-inside: avoid;
}
</style>
</head>
<body>

<header class="cv-header">
  <div class="cv-name">{{ first_name }}<br>{{ last_name }}</div>
  <div class="cv-contact">
    <div class="cv-contact-row">
      <a href="https://{{ website }}">{{ website }}</a>
      <a class="cv-linkedin" href="https://www.linkedin.com/in/{{ linkedin }}" aria-label="LinkedIn profile" title="LinkedIn">
        <img src="assets/linkedin-logo.png" alt="">
      </a>
    </div>
    <a href="mailto:{{ email }}">{{ email }}</a><br>
    <a href="https://maps.app.goo.gl/vU2j4uw1qQUXr7Lk7">{{ location }}</a>
  </div>
</header>

<p class="cv-hint"><em>To save some time, you can use my <a class="cv-hint-site" href="https://www.frederikniesner.com/">new AI tool</a> for additional questions. Give it a try<span class="cv-hint-join"> <a class="cv-gemini-link" href="https://www.frederikniesner.com/?mode=ai" aria-label="Open frederikniesner.com in AI mode" title="AI mode (Gemini)"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><defs><linearGradient id="cvGemGrad" x1="22%" y1="100%" x2="78%" y2="0%"><stop offset="0%" stop-color="#4B88FF"/><stop offset="100%" stop-color="#A178F9"/></linearGradient></defs><path fill="url(#cvGemGrad)" d="M12 1.6l2.1 4.8 5.2.7-3.8 3.7.9 5.2-4.4-2.3-4.4 2.3.9-5.2-3.8-3.7 5.2-.7L12 1.6z"/></svg></a></span></em></p>

{{ content }}

</body>
</html>
