name = "fred-ai-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
# GEMINI_API_KEY is set as encrypted secret: wrangler secret put GEMINI_API_KEY

# Required for AI chat: context markdown (system instruction). Create namespace, paste id, redeploy, then upload key fred_context_md:
#   cd worker && npx wrangler kv namespace create fred-ai-context
#   npx wrangler kv key put fred_context_md --path=../fred-context.local.md --binding=FRED_CONTEXT_KV
[[kv_namespaces]]
binding = "FRED_CONTEXT_KV"
id = "199bf60511274d479fb4531670b7a60d"

# Optional: KV for daily rate limits (see worker/README). Uncomment and set id after
#   npx wrangler kv namespace create fred-ai-rate-limit
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = ""
